name: secret-scan

# Confidentiality guard for the public OSS repo: blocks secrets and
# confidential/planning paths from entering history via push or PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  confidential-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on confidential / planning / secret paths
        run: |
          set -euo pipefail
          # Public-key fixtures are allowed; everything else below is not.
          hits="$(git ls-files \
            | grep -E '(^|/)\.planning/|(^|/)private/|^pro/|^_pro_placeholder/|(^|/)\.env($|\.)|\.key$|(^|/)id_(rsa|ed25519)($|\.)|(^|/)credentials(\.|$)' \
            | grep -Ev 'root[-_]public\.pem$' || true)"
          # .pem allowed only for *public* key fixtures.
          pemhits="$(git ls-files '*.pem' | grep -Ev 'root[-_]public\.pem$' || true)"
          if [ -n "$hits$pemhits" ]; then
            echo "::error::Confidential/planning/secret paths present in the OSS repo:"
            printf '%s\n' "$hits" "$pemhits" | sed '/^$/d'
            exit 1
          fi
          echo "No confidential/planning/secret paths tracked. OK."

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
