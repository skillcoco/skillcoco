name: Check No Pro Leak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to diff against HEAD~1.
          fetch-depth: 2
      - name: Check no pro leak
        run: bash scripts/check-no-pro-leak.sh
